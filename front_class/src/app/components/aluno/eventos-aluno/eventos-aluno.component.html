<div class="page">
  <div class="page-header"><h1>📅 Eventos</h1><p>Visualize os eventos acadêmicos</p></div>
  <div class="lista-vazia" *ngIf="!eventos.length"><p>Nenhum evento cadastrado</p></div>
  <div class="cards-eventos" *ngIf="eventos.length">
    <div class="card-evento" *ngFor="let e of eventos">
      <span class="evento-status" [class]="'status-'+e.status.toLowerCase().replace(' ','-')">{{ e.status }}</span>
      <h3>{{ e.titulo }}</h3>
      <p>📅 {{ e.data | date:'dd/MM/yyyy' }} <span *ngIf="e.horario">às {{ e.horario }}</span></p>
      <p *ngIf="e.descricao">{{ e.descricao }}</p>
    </div>
  </div>
</div>
