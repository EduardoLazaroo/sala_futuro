<div class="page">
  <div class="page-header"><h1>✅ Frequência</h1><p>Visualize seu registro de presença</p></div>
  <div class="lista-vazia" *ngIf="!frequencias.length"><p>Nenhum registro de frequência</p></div>
  <div class="tabela-container" *ngIf="frequencias.length">
    <table class="tabela">
      <thead><tr><th>Data</th><th>Turma</th><th>Status</th></tr></thead>
      <tbody>
        <tr *ngFor="let f of frequencias">
          <td>{{ f.data | date:'dd/MM/yyyy' }}</td>
          <td>{{ f.turma_nome }}</td>
          <td><span class="badge" [class.presente]="f.presente" [class.ausente]="!f.presente">{{ f.presente ? 'Presente' : 'Ausente' }}</span></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
