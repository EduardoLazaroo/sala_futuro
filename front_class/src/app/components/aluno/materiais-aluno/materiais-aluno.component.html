<div class="page">
  <div class="page-header"><h1>📂 Materiais de Apoio</h1><p>Visualize os materiais disponibilizados</p></div>
  <div class="lista-vazia" *ngIf="!materiais.length"><p>Nenhum material disponível</p></div>
  <div class="cards-eventos" *ngIf="materiais.length">
    <div class="card-evento" *ngFor="let m of materiais">
      <h3>{{ m.titulo }}</h3>
      <p *ngIf="m.descricao">{{ m.descricao }}</p>
      <p>📅 {{ m.data_publicacao | date:'dd/MM/yyyy' }}</p>
      <p *ngIf="m.disciplina_nome">📚 {{ m.disciplina_nome }}</p>
      <a *ngIf="m.arquivo_ou_link" [href]="m.arquivo_ou_link" target="_blank" class="btn-link">🔗 Acessar</a>
    </div>
  </div>
</div>
