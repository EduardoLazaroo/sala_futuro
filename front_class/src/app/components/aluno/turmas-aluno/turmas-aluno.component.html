<div class="page">
  <div class="page-header"><h1>👥 Minhas Turmas</h1><p>Visualize as turmas disponíveis</p></div>
  <div class="lista-vazia" *ngIf="!turmas.length"><p>Nenhuma turma cadastrada</p></div>
  <div class="tabela-container" *ngIf="turmas.length">
    <table class="tabela">
      <thead><tr><th>Nome</th><th>Descrição</th><th>Professor</th><th>Status</th></tr></thead>
      <tbody>
        <tr *ngFor="let t of turmas">
          <td>{{ t.nome }}</td>
          <td>{{ t.descricao || '-' }}</td>
          <td>{{ t.professor_nome || '-' }}</td>
          <td><span class="badge" [class.badge-ativa]="t.status==='Ativa'" [class.badge-inativa]="t.status==='Inativa'">{{ t.status }}</span></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
