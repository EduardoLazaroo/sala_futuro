<div class="auth-container">
  <div class="auth-card">
    <button class="btn-back" (click)="voltar()">← Voltar</button>

    <div class="auth-header">
      <span class="auth-icon">🎓</span>
      <h2>Cadastro do Aluno</h2>
      <p>Preencha seus dados para criar sua conta</p>
    </div>

    <form (ngSubmit)="cadastrar()" class="auth-form">
      <div class="form-group">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" [(ngModel)]="nome" name="nome" placeholder="Seu nome" required />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" [(ngModel)]="email" name="email" placeholder="seu@email.com" required />
      </div>

      <div class="form-group">
        <label for="ra">RA</label>
        <input type="text" id="ra" [(ngModel)]="ra" name="ra" placeholder="Seu RA" required />
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" [(ngModel)]="senha" name="senha" placeholder="Crie uma senha" required />
      </div>

      <div class="form-group">
        <label for="confirmarSenha">Confirmar senha</label>
        <input type="password" id="confirmarSenha" [(ngModel)]="confirmarSenha" name="confirmarSenha" placeholder="Repita a senha" required />
      </div>

      <div class="erro" *ngIf="erro">{{ erro }}</div>
      <div class="sucesso" *ngIf="sucesso">{{ sucesso }}</div>

      <button type="submit" class="btn-primary">Cadastrar</button>
    </form>

    <div class="auth-footer">
      <p>Já tem conta? <a (click)="irParaLogin()">Faça login</a></p>
    </div>
  </div>
</div>
