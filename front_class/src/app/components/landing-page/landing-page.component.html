<div class="landing-container">
  <div class="landing-content">
    <div class="logo">
      <h1>📚 Sala Futuro</h1>
      <p>Plataforma Acadêmica Simplificada</p>
    </div>

    <div class="profile-selection">
      <h2>Como você deseja acessar?</h2>
      <div class="cards">
        <div class="card" (click)="selecionarPerfil('aluno')">
          <div class="card-icon">🎓</div>
          <h3>Aluno</h3>
          <p>Acesse suas turmas, notas, materiais e avisos</p>
        </div>

        <div class="card" (click)="selecionarPerfil('professor')">
          <div class="card-icon">👨‍🏫</div>
          <h3>Professor</h3>
          <p>Gerencie turmas, eventos, materiais e notas</p>
        </div>
      </div>
    </div>
  </div>
</div>
