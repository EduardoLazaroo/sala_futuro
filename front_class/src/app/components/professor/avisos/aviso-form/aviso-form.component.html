<div class="page">
  <div class="page-header"><h1>{{ editando ? '✏️ Editar Aviso' : '📢 Novo Aviso' }}</h1></div>
  <div class="form-card">
    <div class="form-group"><label>Título *</label><input type="text" [(ngModel)]="titulo" placeholder="Título do aviso" /></div>
    <div class="form-group"><label>Conteúdo *</label><textarea [(ngModel)]="conteudo" rows="5" placeholder="Conteúdo do aviso"></textarea></div>
    <div class="form-group"><label>Data Publicação *</label><input type="date" [(ngModel)]="data_publicacao" /></div>
    <div class="form-group">
      <label>Turmas</label>
      <div class="turmas-check">
        <label *ngFor="let t of turmas" class="check-item">
          <input type="checkbox" [checked]="turmasSelecionadas.includes(t.id)" (change)="toggleTurma(t.id)" />
          {{ t.nome }}
        </label>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-cancelar" (click)="voltar()">Cancelar</button>
      <button class="btn-salvar" (click)="salvar()">Salvar</button>
    </div>
  </div>
</div>
