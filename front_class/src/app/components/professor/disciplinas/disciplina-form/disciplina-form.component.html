<div class="page">
  <div class="page-header"><h1>{{ editando ? '✏️ Editar Disciplina' : '📚 Nova Disciplina' }}</h1></div>
  <div class="form-card">
    <div class="form-group"><label>Nome *</label><input type="text" [(ngModel)]="nome" placeholder="Nome da disciplina" /></div>
    <div class="form-group"><label>Descrição</label><textarea [(ngModel)]="descricao" rows="3" placeholder="Descrição"></textarea></div>
    <div class="form-row">
      <div class="form-group"><label>Carga Horária *</label><input type="number" [(ngModel)]="carga_horaria" placeholder="Horas" /></div>
      <div class="form-group"><label>Status</label><select [(ngModel)]="status"><option>Ativa</option><option>Inativa</option></select></div>
      <div class="form-group"><label>Professor</label><select [(ngModel)]="professor_id"><option [ngValue]="null">-- Selecione --</option><option *ngFor="let p of professores" [ngValue]="p.id">{{ p.nome }}</option></select></div>
    </div>
    <div class="form-actions">
      <button class="btn-cancelar" (click)="voltar()">Cancelar</button>
      <button class="btn-salvar" (click)="salvar()">Salvar</button>
    </div>
  </div>
</div>
