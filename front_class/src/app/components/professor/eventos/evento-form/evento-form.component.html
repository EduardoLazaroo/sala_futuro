<div class="page">
  <div class="page-header">
    <h1>{{ editando ? '✏️ Editar Evento' : '📅 Novo Evento' }}</h1>
  </div>

  <div class="form-card">
    <div class="form-group">
      <label>Título *</label>
      <input type="text" [(ngModel)]="titulo" placeholder="Título do evento" />
    </div>

    <div class="form-group">
      <label>Descrição</label>
      <textarea [(ngModel)]="descricao" rows="3" placeholder="Descrição do evento"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Data *</label>
        <input type="date" [(ngModel)]="data" />
      </div>
      <div class="form-group">
        <label>Horário</label>
        <input type="time" [(ngModel)]="horario" />
      </div>
      <div class="form-group">
        <label>Status</label>
        <select [(ngModel)]="status">
          <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
        </select>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-cancelar" (click)="voltar()">Cancelar</button>
      <button class="btn-salvar" (click)="salvar()">Salvar</button>
    </div>
  </div>
</div>
