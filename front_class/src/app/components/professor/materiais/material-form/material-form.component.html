<div class="page">
  <div class="page-header"><h1>{{ editando ? '✏️ Editar Material' : '📂 Novo Material' }}</h1></div>
  <div class="form-card">
    <div class="form-group"><label>Título *</label><input type="text" [(ngModel)]="titulo" placeholder="Título do material" /></div>
    <div class="form-group"><label>Descrição</label><textarea [(ngModel)]="descricao" rows="3" placeholder="Descrição"></textarea></div>
    <div class="form-group"><label>Link ou Arquivo</label><input type="text" [(ngModel)]="arquivo_ou_link" placeholder="URL ou caminho do arquivo" /></div>
    <div class="form-row">
      <div class="form-group"><label>Data Publicação *</label><input type="date" [(ngModel)]="data_publicacao" /></div>
      <div class="form-group"><label>Disciplina</label><select [(ngModel)]="disciplina_id"><option [ngValue]="null">-- Selecione --</option><option *ngFor="let d of disciplinas" [ngValue]="d.id">{{ d.nome }}</option></select></div>
    </div>
    <div class="form-actions">
      <button class="btn-cancelar" (click)="voltar()">Cancelar</button>
      <button class="btn-salvar" (click)="salvar()">Salvar</button>
    </div>
  </div>
</div>
